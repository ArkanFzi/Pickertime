<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickertime - Authentication & Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        deepNavy: '#0A0F1D',
                        electricBlue: '#00D4FF',
                        darkSurface: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                    },
                    backgroundImage: {
                        'glow-gradient': 'radial-gradient(circle at center, rgba(0, 212, 255, 0.15) 0%, rgba(10, 15, 29, 0) 70%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0F1D;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #00D4FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .dot-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Custom Input Styles */
        input:focus, select:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.5);
        }
        
        /* Interactive Chip Styles */
        .chip-radio:checked + label {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.5);
            color: #00D4FF;
        }
        
        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #00D4FF;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        
        /* Hide scrollbar for horizontal scroll */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="antialiased min-h-[100dvh] flex flex-col relative">

    <!-- Ambient Background Glows -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-glow-gradient pointer-events-none -z-10"></div>
    <div class="absolute top-0 left-0 w-full h-full dot-pattern opacity-30 pointer-events-none -z-20"></div>

    <!-- Main Container - Mobile First -->
    <main class="flex-1 w-full max-w-[375px] mx-auto flex flex-col px-6 pt-12 pb-8 relative z-10 md:max-w-md lg:max-w-lg xl:max-w-xl">
        
        <!-- Onboarding Header with Progress -->
        <header id="onboarding_header" class="flex flex-col mb-8">
            <div class="flex items-center justify-between mb-6">
                <button class="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/70 hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-white/20"></div>
                    <div class="w-8 h-2 rounded-full bg-electricBlue shadow-[0_0_8px_rgba(0,212,255,0.5)]"></div>
                    <div class="w-2 h-2 rounded-full bg-white/20"></div>
                    <div class="w-2 h-2 rounded-full bg-white/20"></div>
                </div>
                <button class="text-xs font-medium text-white/50 hover:text-white transition-colors">Skip</button>
            </div>
            
            <h1 class="text-3xl font-bold tracking-tight mb-2">
                <span class="text-gradient">Define Your Context</span>
            </h1>
            <p class="text-white/60 text-sm leading-relaxed">
                Step 2/4: Let's tailor Pickertime to your daily reality for optimal schedule generation.
            </p>
        </header>

        <!-- Role Template Selector (Horizontal Scroll) -->
        <section id="role_templates" class="mb-8">
            <h3 class="text-sm font-semibold text-white mb-3">Quick Templates</h3>
            <div class="flex gap-4 overflow-x-auto hide-scroll pb-2 -mx-6 px-6">
                
                <!-- Template Card 1 -->
                <label class="relative flex-shrink-0 w-[140px] cursor-pointer group">
                    <input type="radio" name="template" class="peer sr-only" checked>
                    <div class="glass-panel rounded-2xl p-4 border border-white/10 peer-checked:border-electricBlue peer-checked:bg-[rgba(0,212,255,0.05)] transition-all h-full flex flex-col items-center text-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#0A0F1D]/80 border border-white/10 flex items-center justify-center text-electricBlue group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-code text-lg"></i>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-white">CS Student</h4>
                            <p class="text-[10px] text-white/50 mt-1">Heavy focus blocks</p>
                        </div>
                    </div>
                </label>

                <!-- Template Card 2 -->
                <label class="relative flex-shrink-0 w-[140px] cursor-pointer group">
                    <input type="radio" name="template" class="peer sr-only">
                    <div class="glass-panel rounded-2xl p-4 border border-white/10 peer-checked:border-electricBlue peer-checked:bg-[rgba(0,212,255,0.05)] transition-all h-full flex flex-col items-center text-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#0A0F1D]/80 border border-white/10 flex items-center justify-center text-white/70 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-briefcase text-lg"></i>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-white">9-to-5 Pro</h4>
                            <p class="text-[10px] text-white/50 mt-1">Meeting heavy</p>
                        </div>
                    </div>
                </label>

                <!-- Template Card 3 -->
                <label class="relative flex-shrink-0 w-[140px] cursor-pointer group">
                    <input type="radio" name="template" class="peer sr-only">
                    <div class="glass-panel rounded-2xl p-4 border border-white/10 peer-checked:border-electricBlue peer-checked:bg-[rgba(0,212,255,0.05)] transition-all h-full flex flex-col items-center text-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#0A0F1D]/80 border border-white/10 flex items-center justify-center text-white/70 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-palette text-lg"></i>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-white">Freelancer</h4>
                            <p class="text-[10px] text-white/50 mt-1">Fluid schedule</p>
                        </div>
                    </div>
                </label>
            </div>
        </section>

        <!-- Daily Constraints Configuration -->
        <section id="daily_constraints" class="glass-panel rounded-[24px] p-5 mb-6 flex flex-col gap-5">
            <div class="flex items-center justify-between">
                <h3 class="text-sm font-semibold text-white">Daily Constraints</h3>
                <span class="text-[10px] text-electricBlue bg-electricBlue/10 px-2 py-1 rounded-md">Auto-syncs</span>
            </div>

            <!-- Core Hours -->
            <div class="flex flex-col gap-2">
                <label class="text-xs font-medium text-white/70 ml-1">Core Commitments (School/Work)</label>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-clock text-white/40 text-xs"></i>
                        </div>
                        <select class="w-full bg-[#0A0F1D]/50 border border-white/10 rounded-xl py-2.5 pl-8 pr-4 text-sm text-white appearance-none">
                            <option>09:00 AM</option>
                            <option>08:00 AM</option>
                            <option>10:00 AM</option>
                        </select>
                    </div>
                    <span class="text-white/40 text-sm">to</span>
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-clock text-white/40 text-xs"></i>
                        </div>
                        <select class="w-full bg-[#0A0F1D]/50 border border-white/10 rounded-xl py-2.5 pl-8 pr-4 text-sm text-white appearance-none">
                            <option>04:00 PM</option>
                            <option>05:00 PM</option>
                            <option>06:00 PM</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Commute & Extras Chips -->
            <div class="flex flex-col gap-2">
                <label class="text-xs font-medium text-white/70 ml-1">Fixed Allowances</label>
                <div class="flex flex-wrap gap-2">
                    <div class="relative">
                        <input type="checkbox" id="chip_commute" class="peer sr-only chip-radio" checked>
                        <label for="chip_commute" class="cursor-pointer inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-xs font-medium text-white/70 hover:bg-white/10 transition-all">
                            <i class="fa-solid fa-train-subway"></i> Commute (1h)
                        </label>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="chip_gym" class="peer sr-only chip-radio" checked>
                        <label for="chip_gym" class="cursor-pointer inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-xs font-medium text-white/70 hover:bg-white/10 transition-all">
                            <i class="fa-solid fa-dumbbell"></i> Gym (1.5h)
                        </label>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="chip_meals" class="peer sr-only chip-radio" checked>
                        <label for="chip_meals" class="cursor-pointer inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-xs font-medium text-white/70 hover:bg-white/10 transition-all">
                            <i class="fa-solid fa-utensils"></i> Meals (2h)
                        </label>
                    </div>
                    <button class="inline-flex items-center justify-center w-7 h-7 rounded-full border border-dashed border-white/20 text-white/40 hover:text-white hover:border-white/40 transition-colors">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Focus Style Settings -->
        <section id="focus_settings" class="glass-panel rounded-[24px] p-5 mb-8 flex flex-col gap-5">
            <h3 class="text-sm font-semibold text-white">Focus Profile</h3>
            
            <!-- Focus Length Slider -->
            <div class="flex flex-col gap-3">
                <div class="flex justify-between items-end">
                    <label class="text-xs font-medium text-white/70 ml-1">Preferred Deep Work Block</label>
                    <span class="text-sm font-bold text-electricBlue">90 min</span>
                </div>
                <div class="px-2">
                    <input type="range" min="30" max="180" step="15" value="90" class="w-full">
                    <div class="flex justify-between text-[10px] text-white/40 mt-2 px-1">
                        <span>30m</span>
                        <span>60m</span>
                        <span>120m</span>
                        <span>180m</span>
                    </div>
                </div>
            </div>

            <!-- Study Style Toggles -->
            <div class="flex flex-col gap-2 mt-2">
                <label class="text-xs font-medium text-white/70 ml-1">Methodology</label>
                <div class="grid grid-cols-2 gap-2">
                    <div class="relative">
                        <input type="radio" name="method" id="method_pomodoro" class="peer sr-only chip-radio">
                        <label for="method_pomodoro" class="cursor-pointer flex flex-col gap-1 p-3 rounded-xl border border-white/10 bg-white/5 text-left hover:bg-white/10 transition-all">
                            <span class="text-xs font-semibold text-white">Pomodoro</span>
                            <span class="text-[10px] text-white/50">25m work / 5m break</span>
                        </label>
                    </div>
                    <div class="relative">
                        <input type="radio" name="method" id="method_deep" class="peer sr-only chip-radio" checked>
                        <label for="method_deep" class="cursor-pointer flex flex-col gap-1 p-3 rounded-xl border border-white/10 bg-white/5 text-left hover:bg-white/10 transition-all">
                            <span class="text-xs font-semibold text-white">Deep Flow</span>
                            <span class="text-[10px] text-white/50">Long blocks, rare breaks</span>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dynamic Preview Panel -->
        <section id="schedule_preview" class="glass-panel rounded-[24px] p-1 mb-8 border-electricBlue/30 shadow-[0_0_15px_rgba(0,212,255,0.1)]">
            <div class="bg-[#0A0F1D]/80 rounded-[20px] p-4 flex flex-col gap-3">
                <div class="flex items-center justify-between mb-1">
                    <h4 class="text-xs font-semibold text-white/80 flex items-center gap-1.5">
                        <i class="fa-solid fa-bolt text-electricBlue"></i> Generated Preview
                    </h4>
                    <span class="text-[10px] text-white/40">Based on inputs</span>
                </div>
                
                <!-- Mini Timeline Visual -->
                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center gap-2 text-[10px]">
                        <span class="w-10 text-right text-white/40">09:00</span>
                        <div class="h-6 flex-1 bg-white/10 rounded-md border border-white/5 flex items-center px-2 text-white/60">Core Classes</div>
                    </div>
                    <div class="flex items-center gap-2 text-[10px]">
                        <span class="w-10 text-right text-white/40">16:00</span>
                        <div class="h-4 flex-1 bg-white/5 rounded-md border border-white/5 flex items-center justify-center text-white/40 border-dashed">Commute Gap</div>
                    </div>
                    <div class="flex items-center gap-2 text-[10px]">
                        <span class="w-10 text-right text-electricBlue font-medium">17:00</span>
                        <div class="h-8 flex-1 bg-electricBlue/20 rounded-md border border-electricBlue/30 flex items-center px-2 text-electricBlue font-medium shadow-[inset_0_0_8px_rgba(0,212,255,0.2)]">90m Deep Focus</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Auth Actions & Footer -->
        <section id="auth_actions_footer" class="mt-auto flex flex-col gap-4 pb-6">
            <button class="w-full bg-electricBlue text-[#0A0F1D] font-semibold py-4 rounded-2xl shadow-[0_0_20px_rgba(0,212,255,0.3)] hover:shadow-[0_0_30px_rgba(0,212,255,0.5)] transition-all flex items-center justify-center gap-2">
                Confirm & Continue
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </section>

    </main>
</body>
</html>
