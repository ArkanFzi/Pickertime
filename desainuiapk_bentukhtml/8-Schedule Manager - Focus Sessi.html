<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickertime - Focus Session Complete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        deepNavy: '#0A0F1D',
                        electricBlue: '#00D4FF',
                        darkSurface: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                    },
                    backgroundImage: {
                        'glow-gradient': 'radial-gradient(circle at center, rgba(0, 212, 255, 0.15) 0%, rgba(10, 15, 29, 0) 70%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0F1D;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }
        .pulse-effect {
            animation: pulse-glow 2s infinite;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUpFade 0.6s ease-out forwards;
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        /* Progress Ring Styles */
        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        
        /* Custom Radio for Mood/Energy */
        .mood-radio:checked + div {
            border-color: #00D4FF;
            background: rgba(0, 212, 255, 0.1);
            color: #00D4FF;
        }
        .mood-radio:checked + div i {
            color: #00D4FF;
        }
    </style>
</head>
<body class="antialiased min-h-[100dvh] flex flex-col relative pb-24">

    <!-- Ambient Background Glows -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-glow-gradient pointer-events-none -z-10 opacity-70"></div>
    <div class="absolute top-0 left-0 w-full h-full dot-pattern opacity-30 pointer-events-none -z-20"></div>

    <!-- Main Container -->
    <main class="flex-1 w-full max-w-[375px] mx-auto flex flex-col px-5 pt-8 relative z-10 h-full overflow-y-auto">
        
        <!-- Header -->
        <header id="focus-header" class="flex items-center justify-between mb-6 sticky top-0 bg-[#0A0F1D]/90 backdrop-blur-md pt-2 pb-4 z-40">
            <div class="flex items-center gap-3">
                <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white/70 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/20">
                <i class="fa-solid fa-check text-green-400 text-xs"></i>
                <span class="text-xs font-bold text-green-400 uppercase tracking-wider">Session Complete</span>
            </div>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Session Summary Hero -->
        <section id="session_summary_hero" class="text-center mb-8 animate-slide-up opacity-0">
            <h1 class="text-2xl font-bold text-white mb-2">Great Work!</h1>
            <p class="text-sm text-white/50 mb-6">AP CS Homework block finished.</p>
            
            <div class="relative w-[200px] h-[200px] mx-auto flex items-center justify-center mb-4">
                <!-- Outer Glow -->
                <div class="absolute inset-0 rounded-full shadow-[0_0_30px_rgba(0,212,255,0.2)] pointer-events-none"></div>
                
                <!-- SVG Progress Ring -->
                <svg class="absolute inset-0 w-full h-full" viewBox="0 0 200 200">
                    <!-- Background Circle -->
                    <circle 
                        class="text-white/5" 
                        stroke-width="12" 
                        stroke="currentColor" 
                        fill="transparent" 
                        r="88" 
                        cx="100" 
                        cy="100"
                    />
                    <!-- Progress Circle (Electric Blue) -->
                    <circle 
                        class="progress-ring__circle text-electricBlue drop-shadow-[0_0_8px_rgba(0,212,255,0.6)]" 
                        stroke-width="12" 
                        stroke-linecap="round"
                        stroke="currentColor" 
                        fill="transparent" 
                        r="88" 
                        cx="100" 
                        cy="100"
                        stroke-dasharray="552.92"
                        stroke-dashoffset="0" <!-- 100% complete -->
                    />
                </svg>

                <!-- Inside Ring -->
                <div class="text-center z-10 flex flex-col items-center">
                    <i class="fa-solid fa-trophy text-3xl text-electricBlue mb-2 drop-shadow-[0_0_10px_rgba(0,212,255,0.5)]"></i>
                    <div class="text-3xl font-bold text-white tracking-tighter">45<span class="text-lg text-white/50 font-normal">m</span></div>
                </div>
            </div>
        </section>

        <!-- Stats Bento Grid -->
        <section id="stats_bento_grid" class="grid grid-cols-2 gap-3 mb-8 animate-slide-up opacity-0 delay-100">
            <!-- Stat Card 1 -->
            <div class="glass-panel rounded-2xl p-4 flex flex-col">
                <div class="flex items-center gap-2 mb-3 text-white/60">
                    <i class="fa-regular fa-clock text-xs"></i>
                    <span class="text-xs font-medium uppercase tracking-wider">Deep Focus</span>
                </div>
                <div class="text-2xl font-bold text-white mb-1">42m</div>
                <div class="text-xs text-green-400 flex items-center gap-1">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                    <span>93% efficiency</span>
                </div>
            </div>
            
            <!-- Stat Card 2 -->
            <div class="glass-panel rounded-2xl p-4 flex flex-col">
                <div class="flex items-center gap-2 mb-3 text-white/60">
                    <i class="fa-solid fa-shield-halved text-xs"></i>
                    <span class="text-xs font-medium uppercase tracking-wider">Interruptions</span>
                </div>
                <div class="text-2xl font-bold text-white mb-1">1</div>
                <div class="text-xs text-white/40 flex items-center gap-1">
                    <span>Blocked 3 notifications</span>
                </div>
            </div>

            <!-- Chart Card (Spans full width) -->
            <div class="glass-panel rounded-2xl p-4 col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2 text-white/60">
                        <i class="fa-solid fa-chart-line text-xs"></i>
                        <span class="text-xs font-medium uppercase tracking-wider">Focus Intensity</span>
                    </div>
                </div>
                <!-- Plotly Chart Container -->
                <div id="focus-chart" class="w-full h-[120px]"></div>
            </div>
        </section>

        <!-- Quick Reflection -->
        <section id="reflection_tracker" class="mb-8 animate-slide-up opacity-0 delay-200">
            <h3 class="text-sm font-semibold text-white mb-3 px-1">Quick Reflection</h3>
            <div class="glass-panel rounded-[24px] p-4">
                <p class="text-xs text-white/60 mb-4">How was your energy during this block?</p>
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="energy" class="hidden mood-radio" value="low">
                        <div class="border border-white/10 rounded-xl py-3 flex flex-col items-center gap-2 transition-all hover:bg-white/5">
                            <i class="fa-solid fa-battery-quarter text-white/40 text-lg"></i>
                            <span class="text-xs font-medium text-white/70">Drained</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="energy" class="hidden mood-radio" value="good" checked>
                        <div class="border border-white/10 rounded-xl py-3 flex flex-col items-center gap-2 transition-all hover:bg-white/5">
                            <i class="fa-solid fa-battery-half text-white/40 text-lg"></i>
                            <span class="text-xs font-medium text-white/70">Good</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="energy" class="hidden mood-radio" value="high">
                        <div class="border border-white/10 rounded-xl py-3 flex flex-col items-center gap-2 transition-all hover:bg-white/5">
                            <i class="fa-solid fa-battery-full text-white/40 text-lg"></i>
                            <span class="text-xs font-medium text-white/70">Energized</span>
                        </div>
                    </label>
                </div>
            </div>
        </section>

        <!-- Next Best Action CTA -->
        <section id="next_best_action_cta" class="mb-6 animate-slide-up opacity-0 delay-300">
            <h3 class="text-sm font-semibold text-white mb-3 px-1">Up Next</h3>
            
            <!-- Primary Action -->
            <div class="glass-panel rounded-[24px] p-4 border-electricBlue/30 bg-electricBlue/5 mb-3 relative overflow-hidden group cursor-pointer">
                <div class="absolute inset-0 bg-glow-gradient opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <div class="relative z-10 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-electricBlue/20 flex items-center justify-center border border-electricBlue/30 text-electricBlue">
                            <i class="fa-solid fa-book-open text-lg"></i>
                        </div>
                        <div>
                            <div class="text-xs text-electricBlue font-medium mb-1">Suggested Next Task</div>
                            <div class="text-base font-bold text-white">Read Ch. 5 (History)</div>
                            <div class="text-xs text-white/50 mt-0.5">30 min block • High Priority</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 group-hover:text-electricBlue transition-colors"></i>
                </div>
            </div>

            <!-- Secondary Actions -->
            <div class="grid grid-cols-2 gap-3">
                <button class="glass-panel rounded-2xl py-3.5 flex items-center justify-center gap-2 hover:bg-white/5 transition-colors border-white/10">
                    <i class="fa-solid fa-rotate-right text-white/60 text-sm"></i>
                    <span class="text-sm font-medium text-white/90">Continue AP CS</span>
                </button>
                <button class="glass-panel rounded-2xl py-3.5 flex items-center justify-center gap-2 hover:bg-white/5 transition-colors border-white/10">
                    <i class="fa-solid fa-mug-hot text-white/60 text-sm"></i>
                    <span class="text-sm font-medium text-white/90">Take 15m Break</span>
                </button>
            </div>
            
            <button class="w-full mt-3 py-3 text-sm font-medium text-white/50 hover:text-white transition-colors">
                Return to Dashboard
            </button>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/10 bg-[#0A0F1D]/80 backdrop-blur-xl z-50 pb-safe">
        <div class="max-w-[375px] mx-auto flex justify-between items-center px-6 py-4 md:max-w-md lg:max-w-lg xl:max-w-xl">
            
            <!-- Dashboard (Main Hub) -->
            <a href="#" class="flex flex-col items-center gap-1 text-white/40 hover:text-white/80 transition-colors">
                <div class="w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-house text-lg"></i>
                </div>
            </a>
            
            <!-- Task Creation & Scheduler -->
            <a href="#" class="flex flex-col items-center gap-1 text-white/40 hover:text-white/80 transition-colors">
                <div class="w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-calendar-plus text-lg"></i>
                </div>
            </a>
            
            <!-- Timeline View (The Plan) -->
            <a href="#" class="flex flex-col items-center gap-1 text-white/40 hover:text-white/80 transition-colors">
                <div class="w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-bars-staggered text-lg"></i>
                </div>
            </a>
            
            <!-- Weekly Insights -->
            <a href="#" class="flex flex-col items-center gap-1 text-white/40 hover:text-white/80 transition-colors">
                <div class="w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-chart-simple text-lg"></i>
                </div>
            </a>

        </div>
    </nav>

    <script>
        function initializeCharts() {
            try {
                const xValues = ['0m', '10m', '20m', '30m', '40m', '45m'];
                const yValues = [60, 85, 95, 90, 100, 95];
                
                const trace1 = {
                    x: xValues,
                    y: yValues,
                    type: 'scatter',
                    mode: 'lines',
                    line: {
                        color: '#00D4FF',
                        width: 2,
                        shape: 'spline',
                        smoothing: 1.3
                    },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(0, 212, 255, 0.1)',
                    hoverinfo: 'none'
                };

                const layout = {
                    margin: { t: 5, r: 5, b: 20, l: 5 },
                    plot_bgcolor: 'transparent',
                    paper_bgcolor: 'transparent',
                    xaxis: {
                        showgrid: false,
                        showline: false,
                        zeroline: false,
                        tickfont: { color: 'rgba(255, 255, 255, 0.4)', size: 10 },
                        fixedrange: true
                    },
                    yaxis: {
                        showgrid: true,
                        gridcolor: 'rgba(255, 255, 255, 0.05)',
                        showline: false,
                        zeroline: false,
                        showticklabels: false,
                        fixedrange: true,
                        range: [0, 110]
                    },
                    showlegend: false,
                    dragmode: false
                };

                const config = {
                    responsive: true,
                    displayModeBar: false,
                    displaylogo: false
                };

                Plotly.newPlot('focus-chart', [trace1], layout, config);
            } catch (e) {
                console.error('Error initializing chart:', e);
            }
        }

        window.addEventListener('load', initializeCharts);
        setTimeout(initializeCharts, 1200);
    </script>
</body>
</html>
